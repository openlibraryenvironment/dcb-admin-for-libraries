variables:
  FF_USE_FASTZIP: "true"
  # These can be specified per job or per pipeline
  ARTIFACT_COMPRESSION_LEVEL: "fast"
  CACHE_COMPRESSION_LEVEL: "fast"

default:
  image: 
    name: node:22.12.0-bullseye
    pull_policy: if-not-present

  tags:
    - ki-onprem

stages:
  - build
  - container
  - deploy

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - dcb-admin-for-libraries/.npm/
    - dcb-admin-for-libraries/node-modules/
    - .yarn
    - .npm

build:
  stage: build
  image: 
    name: node:22.12.0-bullseye
    pull_policy: if-not-present
  tags:
    - ki-onprem
  script:
    - export NPM_TOKEN="$NPMJS_TOKEN"
    - git config --global user.name "ianibbo"
    - git config --global user.email "ian.ibbotson@k-int.com"
    - pwd
    - ls -al
    - echo " { \"releaseDate\":\"`date +"%Y-%m-%dT%H:%M:%S%z"`\", \"RELEASED_AT\":\"$RELEASED_AT\" } " > ./release-info.json
    - npm install
    - npm run build
    # - npm run semantic-release -- Commented out for now - not sure this is what is needed here?
  artifacts:
    paths:
      - dist/
    expire_in: 1 hour

build-container-image:
  image: 
    name: docker:stable
    pull_policy: if-not-present
  stage: build
  only:
    - release
  tags:
    - ki-onprem
  script:
    - echo Building container image
    - pwd
    - ls
    - docker info
    - docker login -u $NEXUS_USER -p $NEXUS_PASS docker.libsdev.k-int.com
    - docker build -f ./docker/production/Dockerfile -t docker.libsdev.k-int.com/knowledgeintegration/ki-dcb-admin-for-libraries:latest -t docker.libsdev.k-int.com/knowledgeintegration/ki-dcb-admin-for-libraries:v1 .
    - docker push docker.libsdev.k-int.com/knowledgeintegration/ki-dcb-admin-for-libraries:latest
    - docker push docker.libsdev.k-int.com/knowledgeintegration/ki-dcb-admin-for-libraries:v1
    - docker images

# Copy the dist build up to s3 where we can point cloudfront as a distribution service
deploy_tag_to_s3:
  stage: deploy
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v[0-9].*/'
      when: always
    - when: never
  tags:
    - ki-onprem
  image:
    name: registry.gitlab.com/gitlab-org/cloud-deploy/aws-base:latest
    pull_policy: if-not-present
  script:
    - ls
    - aws s3 ls
    - aws s3 sync dist/ "s3://ki-libs-spa-hosting/dcb-admin-for-libraries-$CI_COMMIT_TAG" --delete
    - aws s3 sync dist/ "s3://ki-libs-spa-hosting/dcb-admin-for-libraries" --delete
  variables:
    AWS_ACCESS_KEY_ID: $AWS_DEVOPS_AGENT_ACCESS_KEY_ID
    AWS_SECRET_ACCESS_KEY: $AWS_DEVOPS_AGENT_ACCESS_KEY_SECRET
    AWS_REGION: eu-west-1
  dependencies: 
    - build

deploy_dev_to_s3:
  stage: deploy
  rules:
    - if: '$CI_COMMIT_TAG == null'
      when: always
    - when: never
  tags:
    - ki-onprem
  image:
    name: registry.gitlab.com/gitlab-org/cloud-deploy/aws-base:latest
    pull_policy: if-not-present
  script:
    - ls
    - aws s3 ls
    - aws s3 sync dist/ "s3://ki-libs-spa-hosting/dcb-admin-for-libraries-dev" --delete
  variables:
    AWS_ACCESS_KEY_ID: $AWS_DEVOPS_AGENT_ACCESS_KEY_ID      
    AWS_SECRET_ACCESS_KEY: $AWS_DEVOPS_AGENT_ACCESS_KEY_SECRET
    AWS_REGION: eu-west-1
  dependencies: 
    - build

