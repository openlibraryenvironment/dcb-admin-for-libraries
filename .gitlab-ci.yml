# Copy the dist build up to s3 where we can point cloudfront as a distribution service
deploy_tag_to_s3:
  stage: deploy
  rules:
    # - if: "$CI_COMMIT_TAG =~ /^v[0-9].*/"
    #   when: always
    # - when: never
    - if: '$CI_COMMIT_BRANCH == "release"'
      when: on_success
    - when: never
  tags:
    - ki-onprem
  image:
    name: registry.gitlab.com/gitlab-org/cloud-deploy/aws-base:latest
    pull_policy: if-not-present
  script:
    - echo "Deploying version $RELEASE_VERSION to S3..."
    # Key layout is <env-root>/<app>/, and the worker picks the root by hostname.
    # Trailing slashes are explicit: --delete is scoped to the destination
    # prefix, and one level up it would wipe the sibling apps in this root.
    - aws s3 sync dist/ "s3://ki-libs-spa-hosting/prod/dcb-admin-for-libraries/" --delete
    # Immutable archive of the released bundle, NOT a servable path: the base
    # ("/dcb-admin-for-libraries/") is baked in, so this copy only ever resolves
    # its assets from that path. It exists to roll back FROM, by copying it over
    # prod/dcb-admin-for-libraries/ - never to be served in place.
    #
    # Keyed on $RELEASE_VERSION from the release job's dotenv report, not
    # $CI_COMMIT_TAG: this job is gated on the `release` BRANCH, so there is no
    # tag in scope and $CI_COMMIT_TAG expanded to nothing - every release
    # overwrote a single key literally named "dcb-admin-for-libraries-".
    - aws s3 sync dist/ "s3://ki-libs-spa-hosting/archive/dcb-admin-for-libraries-$RELEASE_VERSION/" --delete
  variables:
    AWS_ACCESS_KEY_ID: $AWS_DEVOPS_AGENT_ACCESS_KEY_ID
    AWS_SECRET_ACCESS_KEY: $AWS_DEVOPS_AGENT_ACCESS_KEY_SECRET
    AWS_REGION: eu-west-1
  needs:
    - build
    - release
  dependencies:
    - build

deploy_dev_to_s3:
  stage: deploy
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_TAG == null'
      when: always
    - when: never
  tags:
    - ki-onprem
  image:
    name: registry.gitlab.com/gitlab-org/cloud-deploy/aws-base:latest
    pull_policy: if-not-present
  script:
    # dev/, not dcb-admin-for-libraries-dev/. The worker resolves
    # /dcb-admin-for-libraries/... against <env-root>/dcb-admin-for-libraries/,
    # and dev.kihosting.net's root is "dev". A key prefix it does not know about
    # is a 502 - which is exactly what "dcb-admin-for-libraries-dev" was giving.
    - aws s3 sync dist/ "s3://ki-libs-spa-hosting/dev/dcb-admin-for-libraries/" --delete
  variables:
    AWS_ACCESS_KEY_ID: $AWS_DEVOPS_AGENT_ACCESS_KEY_ID
    AWS_SECRET_ACCESS_KEY: $AWS_DEVOPS_AGENT_ACCESS_KEY_SECRET
    AWS_REGION: eu-west-1
  dependencies:
    - build
