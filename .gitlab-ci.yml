variables:
  FF_USE_FASTZIP: "true"
  # These can be specified per job or per pipeline
  ARTIFACT_COMPRESSION_LEVEL: "fast"
  CACHE_COMPRESSION_LEVEL: "fast"

default:
  image:
    name: node:22.12.0-bullseye
    pull_policy: if-not-present

  tags:
    - ki-onprem

stages:
  - build
  - release
  - container
  - deploy

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - dcb-admin-for-libraries/.npm/
    - dcb-admin-for-libraries/node-modules/
    - .yarn
    - .npm

build:
  stage: build
  image:
    name: node:22.12.0-bullseye
    pull_policy: if-not-present
  tags:
    - ki-onprem
  script:
    - export NPM_TOKEN="$NPMJS_TOKEN"
    - git config --global user.name "ianibbo"
    - git config --global user.email "ian.ibbotson@k-int.com"
    - pwd
    - ls -al
    - echo " { \"releaseDate\":\"`date +"%Y-%m-%dT%H:%M:%S%z"`\", \"RELEASED_AT\":\"$RELEASED_AT\" } " > ./release-info.json
    - npm ci
    # must equal the S3 app prefix the worker serves this app from.
    - VITE_PUBLIC_URL=/dcb-admin-for-libraries/ npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 hour

release:
  stage: release
  image:
    name: node:22.12.0-bullseye
    pull_policy: if-not-present
  tags:
    - ki-onprem
  # This rule ensures the job ONLY runs on the 'release' branch
  rules:
    - if: '$CI_COMMIT_BRANCH == "release"'
      when: always
    - when: never
  script:
    - export NPM_TOKEN="$NPMJS_TOKEN"
    # Set up git credentials again for this job
    - git config --global user.name "ianibbo"
    - git config --global user.email "ian.ibbotson@k-int.com"
    - pwd
    - ls -al
    - echo " { \"releaseDate\":\"`date +"%Y-%m-%dT%H:%M:%S%z"`\", \"RELEASED_AT\":\"$RELEASED_AT\" } " > ./release-info.json
    - npm ci
    # Run the release, save the version so we can use it in the next stage
    - npm run semantic-release
    - echo "RELEASE_VERSION=v$(node -p "require('./package.json').version")" > deploy.env
  artifacts:
    reports:
      dotenv: deploy.env
  # This job depends on the build job completing successfully
  dependencies:
    - build

